<!DOCTYPE html>
<html lang="en">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e1e2f">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do App</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #3a3a6a);
    color: white;
    overflow-x: hidden;
}

.dark {
    background: black;
    color: white;
}

.container {
    max-width: 400px;
    margin: auto;
    padding: 20px;
    text-align: center;
}

h1 {
    margin-bottom: 20px;
}

.input-box {
    display: flex;
    gap: 10px;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 5px;
    border: none;
}

button {
    padding: 10px 15px;
    border: none;
    background: cyan;
    cursor: pointer;
    border-radius: 5px;
    font-weight: bold;
}

ol {
    padding-left: 30px;
}

li {
    background: #2a2a4d;
    margin: 10px 0;
    padding: 10px;
    border-radius: 8px;

    list-style-position: outside;

    display: flex;             
    align-items: center;
    justify-content: space-between;
}

.task-left {
    display: flex;
    align-items: center;
    gap: 10px;
}

.task-left span {
    font-size: 14px;
    line-height: 1.3;
}

.delete {
    padding: 5px 10px;
    font-size: 12px;
}
ol {
    counter-reset: item;
}

li {
    counter-increment: item;
}

li::before {
    content: counter(item) ". ";
    margin-right: 10px;
    font-weight: bold;
}
.completed {
    text-decoration: line-through;
    color: gray;
}

.delete {
    background: red;
    color: white;
    border: none;
    padding: 5px 10px;
    cursor: pointer;
    border-radius: 5px;
}
.dark-btn {
    margin-bottom: 10px;
}

@media (max-width: 600px) {
    h1 {
        font-size: 22px;
    }
}

.creator a {
    color: cyan;
    text-decoration: none;
    font-weight: bold;
}
.creator a:hover {
    text-decoration: underline;
}
    .time-box {
    display: flex;
    gap: 10px;
    margin-top: 10px;
    justify-content: center;
}

.time-box div {
    display: flex;
    flex-direction: column;
    font-size: 12px;
    text-align: left;
}

.time-box input {
    padding: 8px;
    border-radius: 5px;
    border: none;
}

@media (max-width: 600px) {
    .time-box {
        flex-direction: column;
    }
}

</style>
</head>

<body>

<div class="container">
    <button id="installBtn" style="display:none;">📲 Install App</button>
    <p id="installMsg">👉 Tap menu (⋮) → "Add to Home Screen" to install</p>
    <button class="dark-btn" onclick="toggleMode()">🌙 Dark Mode</button>

    <h1>📝 My To-Do List</h1>

    <p class="creator">
        Created by <a href="https://riju-web-dev.github.io/portfolio-website/" target="_blank">Riju Bose</a>
    </p>

    <div class="input-box">
    <input type="text" id="taskInput" placeholder="Enter your task">
    <button onclick="addTask()">Add</button>
</div>

<div class="time-box">
    <div>
        <label>Date</label>
        <input type="date" id="taskDate">
    </div>

    <div>
        <label>Start Time</label>
        <input type="time" id="startTime">
    </div>

    <div>
        <label>End Time</label>
        <input type="time" id="endTime">
    </div>
</div>
<ol id="taskList"></ol>
<script>

function saveTasks() {
    localStorage.setItem("tasks", document.getElementById("taskList").innerHTML);
}

function loadTasks() {
    document.getElementById("taskList").innerHTML = localStorage.getItem("tasks") || "";
}

loadTasks();

function addTask() {
    let input = document.getElementById("taskInput");
    let date = document.getElementById("taskDate").value;
    let start = document.getElementById("startTime").value;
    let end = document.getElementById("endTime").value;

    let task = input.value.trim();

    if (task === "") {
        alert("Please enter a task");
        return;
    }
    if (date === "" || start === "" || end === "") {
    let confirmAdd = confirm("Do you want to add task without date & time?");
    if (!confirmAdd) {
        return;
    }
}
    let dayName = "";
    if (date) {
        let d = new Date(date);
        dayName = d.toLocaleDateString("en-US", { weekday: "long" });
    }

    let li = document.createElement("li");

    li.innerHTML = `
        <div class="task-left">
            <input type="checkbox" onclick="toggleTask(this)">
            <span onclick="editTask(this)">
                ${task}<br>
                📅 ${date ? date + " (" + dayName + ")" : ""}
                ${start && end ? "<br>⏰ " + start + " - " + end : ""}
            </span>
        </div>
        <button class="delete" onclick="deleteTask(this)">X</button>
    `;

    document.getElementById("taskList").appendChild(li);

    input.value = "";
    document.getElementById("taskDate").value = "";
    document.getElementById("startTime").value = "";
    document.getElementById("endTime").value = "";

    saveTasks();
}

function deleteTask(btn) {
    btn.parentElement.remove();
    saveTasks();
}

function toggleTask(checkbox) {
    let text = checkbox.nextElementSibling;

    if (checkbox.checked) {
        text.classList.add("completed");
        alert("Great! Task Completed ✅");
    } else {
        text.classList.remove("completed");
    }

    saveTasks();
}

function editTask(element) {
    let newText = prompt("Edit your task:", element.innerText);
    if (newText !== null && newText !== "") {
        element.innerText = newText;
        saveTasks();
    }
}

function toggleMode() {
    document.body.classList.toggle("dark");
}

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
    let deferredPrompt;

window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById("installBtn").style.display = "block";
});

document.getElementById("installBtn").addEventListener("click", async () => {
    if (deferredPrompt) {
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
    }
});
</script>

</body>
</html>
